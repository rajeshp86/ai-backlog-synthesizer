name: Tests & Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Nightly schedule removed to avoid unattended Anthropic credit usage.
  # Run the full live eval suite on demand via the "Run workflow" button
  # (workflow_dispatch) — e.g. before a release or after a prompt change.

jobs:
  unit-tests:
    name: "Unit tests (Python 3.13)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.13-${{ hashFiles('requirements-lock.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.13-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Lint (ruff — pyflakes + syntax only)
        # Narrow ruleset on purpose: pyflakes catches real bugs (unused
        # imports, undefined names, etc.) without turning every PR into a
        # style argument. E9 catches syntax errors.
        run: ruff check src/ tests/ evaluation/ --select F,E9

      - name: Unit tests
        # All tests are agent/redactor/orchestrator units with mocked Claude —
        # zero API spend. The live eval suite is the separate gated job below.
        run: |
          mkdir -p artifacts
          python -m pytest tests/ \
            --junit-xml=artifacts/pytest-results.xml \
            -v

      - name: Upload pytest results
        if: always()  # surface report even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: artifacts/pytest-results.xml
          retention-days: 90

  docker-build:
    name: Docker build verification
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # A cold build (cache miss) compiles/installs the full deps incl. the CPU
    # torch wheel, which can exceed 15 min and was getting cancelled. Warm builds
    # (GHA layer cache hit) finish in a couple of minutes; 25 covers a cold build.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verification only — no registry push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # We skip `load: true` deliberately. The CPU-only torch wheel keeps
          # the image around 1 GB; loading it into the local Docker daemon on
          # the runner competes with the buildx cache for disk. The
          # verification-only build (no load) is enough as a regression gate.
          # Run it locally to inspect: `docker build -t backlog-synthesizer .`
          load: false
          tags: backlog-synthesizer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  eval-suite:
    name: Eval suite (gated, live LLM)
    runs-on: ubuntu-latest
    # Burning real Anthropic credit, so the trigger is gated: never on PRs.
    # Push to main runs a FAST single-case smoke; the full suite (all golden
    # cases + LLM judge + regression enforcement) runs on-demand only via
    # workflow_dispatch (the nightly schedule was removed to save credit).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' }}
    needs: unit-tests
    # Full suite makes 50-80+ sequential LLM calls — 20 min was too short and the
    # job got cancelled mid-run. 45 min covers a full run with headroom.
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip if no API key configured
        # Forks won't have the secret; rather than failing the job, gate
        # downstream steps on this output so the job ends cleanly.
        # Also decide the mode: push → smoke (one case, no judge);
        # workflow_dispatch → full (all cases + judge + regression enforcement).
        id: gate
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping eval suite — ANTHROPIC_API_KEY secret not configured."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "mode=smoke" >> "$GITHUB_OUTPUT"
            else
              echo "mode=full" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install deps
        if: steps.gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-lock.txt

      - name: Eval smoke test (push — one case, deterministic)
        # Fast guard on every push: run a single golden case through the live
        # pipeline (no LLM judge) to confirm the harness + agents still work
        # end-to-end. ~2-3 min, minimal credit. Full mocked coverage is in unit-tests.
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.mode == 'smoke'
        run: |
          mkdir -p artifacts
          python evaluation/run_evaluation.py --case case_01 --no-save-results 2>&1 \
            | tee artifacts/eval-results.txt

      - name: Run full eval suite (manual — Anthropic Claude)
        # All 10 golden cases + LLM-as-judge → 50-80+ API calls, ~$2-4 on Sonnet.
        # Runs only on workflow_dispatch (manual), never on push or PR.
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.mode == 'full'
        run: |
          mkdir -p artifacts
          python evaluation/run_evaluation.py --use-llm-judge 2>&1 \
            | tee artifacts/eval-results.txt

      - name: Regression dashboard (with enforcement)
        # Aggregate results and EXIT NON-ZERO if any case drops ≥0.10 vs main.
        # Only meaningful for the full suite, so it runs in 'full' mode only.
        if: steps.gate.outputs.skip != 'true' && steps.gate.outputs.mode == 'full'
        run: |
          mkdir -p artifacts
          python evaluation/dashboard.py \
            --md artifacts/dashboard.md \
            --fail-on-regression \
            --regression-threshold 0.10 \
            2>&1 | tee artifacts/dashboard.txt
          # dashboard.py exits 1 if regression found; propagate it
          exit ${PIPESTATUS[0]}

      - name: Upload eval results
        if: always() && steps.gate.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            artifacts/eval-results.txt
            artifacts/dashboard.txt
            artifacts/dashboard.md
            evaluation/results/**
          retention-days: 90
