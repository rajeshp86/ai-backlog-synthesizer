name: Infrastructure → AWS

on:
  push:
    branches: [main]
    paths: ["infra/aws/**"]
  pull_request:
    branches: [main]
    paths: ["infra/aws/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan

env:
  TF_DIR: infra/aws
  TF_VERSION: "1.9.0"

jobs:
  terraform:
    name: "Terraform (${{ github.event_name == 'workflow_dispatch' && inputs.action || (github.event_name == 'push' && 'apply') || 'plan' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Require manual approval for apply/destroy via the aws-production environment.
    # Create this environment in repo Settings → Environments with required reviewers.
    environment: >-
      ${{
        (github.event_name == 'push' ||
         (github.event_name == 'workflow_dispatch' && inputs.action != 'plan'))
        && 'aws-production' || ''
      }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=aws/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Terraform format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="key_pair_name=${{ secrets.TF_VAR_KEY_PAIR_NAME }}" \
            -out=tfplan \
            2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `### Terraform Plan — AWS\n\`\`\`hcl\n${truncated}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('### Terraform Plan — AWS')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Terraform apply
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="key_pair_name=${{ secrets.TF_VAR_KEY_PAIR_NAME }}"

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-aws
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## Terraform AWS — ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | ${{ secrets.AWS_REGION }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| State bucket | ${{ secrets.TF_STATE_BUCKET }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | ${{ github.ref }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"