name: Infrastructure → Azure

on:
  push:
    branches: [main]
    paths: ["infra/azure/**"]
  pull_request:
    branches: [main]
    paths: ["infra/azure/**"]
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        type: choice
        options: [plan, apply, destroy]
        default: plan

env:
  TF_DIR: infra/azure
  TF_VERSION: "1.9.0"
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID:       ${{ secrets.ARM_TENANT_ID }}
  ARM_CLIENT_ID:       ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET:   ${{ secrets.ARM_CLIENT_SECRET }}

jobs:
  terraform:
    name: "Terraform (${{ github.event_name == 'workflow_dispatch' && inputs.action || (github.event_name == 'push' && 'apply') || 'plan' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Require manual approval for apply/destroy via the azure-production environment.
    # Create this environment in repo Settings → Environments with required reviewers.
    environment: >-
      ${{
        (github.event_name == 'push' ||
         (github.event_name == 'workflow_dispatch' && inputs.action != 'plan'))
        && 'azure-production' || ''
      }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=backlog-synthesizer.terraform.tfstate"

      - name: Terraform format check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -var="client_id=${{ secrets.ARM_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.ARM_CLIENT_SECRET }}" \
            -var="acr_name=${{ secrets.TF_VAR_ACR_NAME }}" \
            -var="storage_account_name=${{ secrets.TF_VAR_STORAGE_ACCOUNT_NAME }}" \
            -var="key_vault_name=${{ secrets.TF_VAR_KEY_VAULT_NAME }}" \
            -var="spn_object_id=${{ secrets.TF_VAR_SPN_OBJECT_ID }}" \
            -var="anthropic_api_key=${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}" \
            -var="google_api_key=${{ secrets.TF_VAR_GOOGLE_API_KEY || '' }}" \
            -var="jira_api_token=${{ secrets.TF_VAR_JIRA_API_TOKEN || '' }}" \
            -out=tfplan \
            2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `### Terraform Plan — Azure\n\`\`\`hcl\n${truncated}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('### Terraform Plan — Azure')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Terraform apply
        if: >-
          github.event_name == 'push' ||
          (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform destroy -auto-approve \
            -var="subscription_id=${{ secrets.ARM_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ secrets.ARM_TENANT_ID }}" \
            -var="client_id=${{ secrets.ARM_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.ARM_CLIENT_SECRET }}" \
            -var="acr_name=${{ secrets.TF_VAR_ACR_NAME }}" \
            -var="storage_account_name=${{ secrets.TF_VAR_STORAGE_ACCOUNT_NAME }}" \
            -var="key_vault_name=${{ secrets.TF_VAR_KEY_VAULT_NAME }}" \
            -var="spn_object_id=${{ secrets.TF_VAR_SPN_OBJECT_ID }}" \
            -var="anthropic_api_key=${{ secrets.TF_VAR_ANTHROPIC_API_KEY }}" \
            -var="google_api_key=${{ secrets.TF_VAR_GOOGLE_API_KEY || '' }}" \
            -var="jira_api_token=${{ secrets.TF_VAR_JIRA_API_TOKEN || '' }}"

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-azure
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## Terraform Azure — ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Subscription | ${{ secrets.ARM_SUBSCRIPTION_ID }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| State account | ${{ secrets.TF_STATE_STORAGE_ACCOUNT }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Ref | ${{ github.ref }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | ${{ github.sha }} |" >> "$GITHUB_STEP_SUMMARY"